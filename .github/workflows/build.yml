name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install native CLI
        run: npm install -g @native-sdk/cli
      - name: Build
        run: |
          node scripts/link-native-sdk.js
          native build --yes
      - name: Test
        run: native test --yes
      - name: Package (.app, ad-hoc signed)
        run: native package --target macos --signing adhoc
      - name: Zip app bundle
        run: |
          cd zig-out/package
          ditto -c -k --sequesterRsrc --keepParent inpute.app inpute-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: inpute-macos
          path: zig-out/package/inpute-macos.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # The native CLI's own Zig auto-downloader only knows about macOS
      # and Linux (see @native-sdk/cli's toolchain.zig) — Windows has no
      # managed-download mapping at all, so install it directly from the
      # same official index native's own downloader trusts, verifying
      # the checksum ourselves rather than pinning one by hand.
      - name: Install Zig 0.16.0
        shell: pwsh
        run: |
          $index = Invoke-RestMethod -Uri "https://ziglang.org/download/index.json"
          $entry = $index."0.16.0"."x86_64-windows"
          Invoke-WebRequest -Uri $entry.tarball -OutFile zig.zip
          $actual = (Get-FileHash -Algorithm SHA256 zig.zip).Hash.ToLower()
          if ($actual -ne $entry.shasum) {
            Write-Error "zig archive checksum mismatch: expected $($entry.shasum), got $actual"
            exit 1
          }
          Expand-Archive -Path zig.zip -DestinationPath "$env:USERPROFILE\zig"
          $zigDir = Get-ChildItem "$env:USERPROFILE\zig" -Directory | Select-Object -First 1
          Add-Content -Path $env:GITHUB_PATH -Value $zigDir.FullName
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # npm's default global prefix (e.g. C:\npm\prefix) and the checked-out
      # repo (D:\a\...) sit on DIFFERENT drives on windows-latest runners.
      # Windows relative paths cannot cross drive letters, so
      # scripts/link-native-sdk.js's `path.relative()` call has nothing
      # valid to return — force the global npm prefix onto the same drive
      # as the checkout so a real relative path exists at all.
      - name: Put npm global prefix on the same drive as the checkout
        shell: pwsh
        run: |
          $drive = (Get-Item $env:GITHUB_WORKSPACE).PSDrive.Name
          $prefix = "$($drive):\npm-global"
          New-Item -ItemType Directory -Force -Path $prefix | Out-Null
          npm config set prefix $prefix
          Add-Content -Path $env:GITHUB_PATH -Value $prefix
      - name: Install native CLI
        run: npm install -g @native-sdk/cli
      # NOTE: if this fails with "failed to check cache ... native-sdk.manifest
      # file_hash FileNotFound", that's a missing asset in the installed CLI
      # package itself (seen once during local dev), not this repo's code —
      # try a different @native-sdk/cli version.
      - name: Build
        run: |
          node scripts/link-native-sdk.js
          native build --yes
      - name: Test
        run: native test --yes
      - uses: actions/upload-artifact@v4
        with:
          name: inpute-windows
          path: zig-out/bin/inpute.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # NOTE: libwebkitgtk-6.0-dev is fairly new; if this step fails with
      # "unable to locate package", ubuntu-latest's default repos don't
      # have it yet and this needs a PPA or a newer runner image — this
      # is the first thing to check if this job breaks.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libx11-dev libxtst-dev
      - name: Install native CLI
        run: npm install -g @native-sdk/cli
      - name: Build
        run: |
          node scripts/link-native-sdk.js
          native build --yes
      - name: Test
        run: native test --yes
      - uses: actions/upload-artifact@v4
        with:
          name: inpute-linux
          path: zig-out/bin/inpute
